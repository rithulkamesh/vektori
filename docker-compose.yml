version: "3.8"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: vektori
      POSTGRES_USER: vektori
      POSTGRES_PASSWORD: vektori
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vektori"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
